name: CI Gauntlet

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  gauntlet:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Formatting Check
        run: uv run ruff format --check --output-format=concise

      - name: Linting Check
        run: uv run ruff check --output-format=concise

      # Typst fetches @preview packages (mitex + deps) from
      # packages.typst.org during compile tests; cache them so a registry
      # outage can't flake CI. Bump the key when the template's mitex
      # version changes.
      - name: Cache Typst packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/typst
          key: typst-packages-mitex-0.2.4

      - name: Import Smoke (every shipped module must import)
        env:
          PAPERNEWS_NO_SCHED: "1"
          DEEPSEEK_API_KEY: "dummy-key-for-ci"
        run: uv run python -c "import papernews.serve, papernews.core.main, papernews.__main__"

      - name: The Test Gauntlet
        env:
          PREFECT_TEST_MODE: "true"
          PREFECT_SERVER_ALLOW_EPHEMERAL_MODE: "false"
          PREFECT_API_URL: ""
          DEEPSEEK_API_KEY: "dummy-key-for-ci"
        run: >
          uv run pytest tests/ -n auto -q --tb=short --disable-warnings
          --cov=papernews --cov-report=term --cov-fail-under=80

      - name: Type Checking
        run: uv run mypy papernews/

  docker-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t papernews:ci .

      - name: Boot container and probe endpoints
        run: |
          docker run -d --name papernews-ci \
            -e PAPERNEWS_NO_SCHED=1 \
            -e DEEPSEEK_API_KEY=dummy-key-for-ci \
            -p 8000:8000 papernews:ci

          # Wait for the server to come up.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/healthz > /dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:8000/healthz
          curl -fsS http://localhost:8000/sources

          # No edition built yet: /digest.pdf must 404 cleanly, not crash.
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/digest.pdf)
          test "$code" = "404"

          # GET /ingest returns the friendly 405 hint.
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/ingest)
          test "$code" = "405"

      - name: Dump container logs on failure
        if: failure()
        run: docker logs papernews-ci || true
