services:
  papernews:
    build: .
    image: papernews:latest
    container_name: papernews
    restart: unless-stopped
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - PAPERNEWS_LLM_ENABLED=${PAPERNEWS_LLM_ENABLED:-}
      - PAPERNEWS_LLM_PROVIDER=${PAPERNEWS_LLM_PROVIDER:-deepseek}
      - PAPERNEWS_LLM_MODEL=${PAPERNEWS_LLM_MODEL:-}
      - PAPERNEWS_LLM_BASE_URL=${PAPERNEWS_LLM_BASE_URL:-}
      - PAPERNEWS_LLM_API_KEY=${PAPERNEWS_LLM_API_KEY:-}
      - INGEST_INTERVAL_SECONDS=${INGEST_INTERVAL_SECONDS:-14400}
      - INGEST_SCHEDULE=${INGEST_SCHEDULE:-}
      - INGEST_TIMEZONE=${INGEST_TIMEZONE:-UTC}
      - POST_INGEST_HOOK=${POST_INGEST_HOOK:-}
      - POST_INGEST_HOOK_TIMEOUT=${POST_INGEST_HOOK_TIMEOUT:-300}
    volumes:
      - ./data:/data
      - ./sources.toml:/app/sources.toml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
