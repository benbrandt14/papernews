services:
  papernews:
    build: .
    image: papernews:latest
    container_name: papernews
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./sources.toml:/app/sources.toml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
