services:
  papernews:
    build: .
    image: papernews:latest
    container_name: papernews
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
      # Writable so the /edit web editor can save changes back to the host
      # file. The app writes in place (never replace-by-rename) because a
      # single-file bind mount is pinned to this inode.
      - ./sources.toml:/app/sources.toml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
