name  = "Hackaday"
category = "Hackaday"
kind  = "rss"
url   = "https://hackaday.com/blog/feed/"
since_hours = 48

[preferences]
default_category_limit = 1
prefer_category = ["space", "simulation", "high performance computing", "photography", "3d scanning", "lidar", "signal processing", "reinforcement learning", "cognitive science", "neuroscience", "science", "geometry", "knowledge representation", "mechanism", "machine tools", "scientific computing", "applied mathematics", "mechanical", "engineering", "robotics", "modular synthesis", "marine biology", "ecology", "scuba diving", "underwater habitation", "architecture", "systems", "control", "dynamics", "state estimation"]
less_prefer_category = ["sports", "raspberry pi", "security", "genetics", "politics", "economics", "automotive", "cars", "recycling", "CSS", "UI/UX"]
blacklist_words = ["Anthropic", "OpenAI", "Claude", "ChatGPT", "agentic"]
interest = ["Articles with technical depth and novelty", "Articles with a unique, earned perspective", "Only include high-value product reviews or comparisons, no ad articles or bloatware", "Realistic and accurate AI news without hype", "Updates to tools I use (Matlab/Simulink, Julia, Wolfram Alpha)", "New tools, languages, techniques, and frameworks.", "Ocean science, diving, and underwater exploration with real substance"]
disinterest = ["sensationalism and repetitive verbosity", "local announcements or updates not directed to a general audience"]

[category_limits]
"Science" = 3
"Math" = 2
"Space" = 2
"Ocean" = 2
"Academic" = 3
"Scientific Computing" = 2
"Artificial Intelligence" = 2
"Programming" = 2
"Music" = 1
"Photography" = 1
"Hacker News" = 3
"Hackaday" = 3
