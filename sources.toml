# --- Aggregator (last on purpose; mostly social, occasional gems) --------

[[source]]
name = "Hacker News"
category = "Hacker News"
kind = "hn"
limit = 6
since_hours = 48
min_points = 250

[[source]]
name  = "Hackaday"
category = "Hackaday"
kind  = "rss"
url   = "https://hackaday.com/blog/feed/"
limit = 4
since_hours = 48

[preferences]
default_category_limit = 1
prefer_category = ["space", "simulation", "high performance computing", "photography", "3d scanning", "lidar", "signal processing", "reinforcement learning", "cognitive science", "neuroscience", "science", "geometry", "knowledge representation", "mechanisms", "machine tools", "scientific computing", "applied mathematics", "mechanical engineering", "robotics", "modular synthesis", "marine biology","ecology", "scuba diving", "underwater habitation", "architecture", "systems", "control theory, dynamics", "state estimation"]
less_prefer_category = ["sports", "raspberry pi", "security", "genetics", "politics", "economics", "automotive", "cars", "recycling"]
blacklist_words = ["Anthropic", "OpenAI", "Claude", "ChatGPT", "agentic"]
interest = ["Articles with technical depth and novelty", "Articles with a unique, earned perspective", "Only include high-value product reviews or comparisons, no ad articles or bloatware", "Realistic and accurate AI news without hype","Updates to tools I use (Matlab/Simulink, Julia, Wolfram Alpha)", "New tools, languages, techniques, and frameworks."]
disinterest = ["sensationalism and repetitive verbosity"]

[category_limits]
"Math" = 2
"Space" = 2
"Hackaday" = 3
"Hackaday" = 3